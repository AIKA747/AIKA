server:
  servlet:
    context-path: /order
  port: 8082
spring:
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/aika_order?serverTimezone=UTC&characterEncoding=utf-8
    username: root
    password: 123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: false
  cloud:
    nacos:
      config:
        enabled: false
feign:
  sentinel:
    enabled: true
logging:
  config: classpath:logback-spring.xml
  level:
    root: error
    com.parsec: info
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
stripe:
  publicKey: 456789
  secretKey: 123456789
  endpointSecret: 123456789
freedompay:
  merchantId: 123456
  secretKey: 123456789
  domain: https://test-api.freedompay.money
  initPayment: init_payment.php
  getStatus: get_status3.php
  resultUrl: https://api.aikavision.com/order/public/freedompay/result
  successUrl: https://www.baidu.com
  failureUrl: https://www.baidu.com