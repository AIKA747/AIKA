spring:
  application:
    name: aika-bot-service
  profiles:
    active: ${NACOS_NS:local}
  cloud:
    nacos:
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      server-addr: ${NACOS_ADDR:}
      config:
        namespace: ${NACOS_NS:public}
        file-extension: yaml
        extension-configs[0]:
          data-id: rabbitmq.yaml
      discovery:
        namespace: ${NACOS_NS:public}
  main:
    allow-circular-references: true
